name: github-actions
run-name: ${{ github.actor }} is learning GitHub Action
on:
  pull_request:
    branches: [ main ]
jobs:
  check-backend-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - run: cd my-backend
      - run: pwd
      - run: cat package.json
      - run: npm install
      - run: npm test
  check-frontend-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - run: cd my-react-app
      - run: pwd
      - run: cat package.json
      - run: npm install
      - run: npm run
      
