name: github-actions
run-name: ${{ github.actor }} is learning GitHub Actions
on [pull-requests]
jobs:
check-bats-version:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm test
      - run: bats -v
