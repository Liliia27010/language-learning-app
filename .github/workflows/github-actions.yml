name: github-actions
run-name: ${{ github.actor }} is learning GitHub Action
on:
  pull_request:
    branches: [ main ]
jobs:
  check-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm run
      - run: npm test
      - run: bats -v
      
